name: Build patched propolis-server

on:
  push:
    branches: [string-io-emulation]
    paths-ignore:
      - '*.md'
      - '.github/**'
  workflow_dispatch:

env:
  CARGO_TARGET_DIR: /home/swherdman/cache/propolis-target

jobs:
  build:
    runs-on: [self-hosted, helios]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "/opt/ooce/node-18/bin" >> $GITHUB_PATH
          mkdir -p $CARGO_TARGET_DIR

      - name: Build propolis-server (release)
        run: |
          source $HOME/.cargo/env
          rustc -V
          cargo build --release --bin propolis-server

      - name: Get version info
        id: version
        run: |
          git remote add upstream https://github.com/oxidecomputer/propolis.git 2>/dev/null || true
          git fetch upstream master --depth=1
          UPSTREAM_BASE=$(git merge-base upstream/master HEAD | head -c 7)
          echo "tag=patched-${UPSTREAM_BASE}" >> $GITHUB_OUTPUT
          echo "base=${UPSTREAM_BASE}" >> $GITHUB_OUTPUT

      - name: Package artifacts
        run: |
          gzip -c $CARGO_TARGET_DIR/release/propolis-server > propolis-server.gz
          ls -lh propolis-server.gz
          sha256sum propolis-server.gz > propolis-server.gz.sha256
          sed "s/__RELEASE_TAG__/${{ steps.version.outputs.tag }}/" patch-propolis.sh > patch-propolis-release.sh
          chmod +x patch-propolis-release.sh

      - name: Generate release body
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SHORT="${{ steps.version.outputs.base }}"
          REPO="${{ github.repository }}"
          sed "s/__SHORT__/${SHORT}/g; s/__TAG__/${TAG}/g; s|__REPO__|${REPO}|g" .github/release-body.md > /tmp/release-body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: /tmp/release-body.md
          files: |
            propolis-server.gz
            propolis-server.gz.sha256
            patch-propolis-release.sh
          draft: false
          prerelease: false
