name: Sync upstream and build patched releases

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:

env:
  CARGO_TARGET_DIR: /home/swherdman/cache/propolis-target

jobs:
  sync-and-build:
    runs-on: [self-hosted, helios]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: string-io-emulation
          fetch-depth: 0

      - name: Setup environment
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "/opt/ooce/node-18/bin" >> $GITHUB_PATH
          mkdir -p $CARGO_TARGET_DIR

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/oxidecomputer/propolis.git 2>/dev/null || true
          git fetch upstream master
          git fetch origin master

      - name: Determine new commits
        id: commits
        run: |
          # Commits between our last sync (origin/master) and upstream HEAD
          COMMITS=$(git rev-list --reverse origin/master..upstream/master)
          COUNT=$(echo "$COMMITS" | grep -c . || true)
          echo "count=${COUNT}" >> $GITHUB_OUTPUT
          echo "Upstream commits to process: ${COUNT}"
          echo "$COMMITS" | while read hash; do
            [ -z "$hash" ] && continue
            SHORT=$(echo $hash | head -c 7)
            MSG=$(git log --format='%s' -1 $hash)
            echo "  ${SHORT} ${MSG}"
          done

      - name: Build releases for each upstream commit
        if: steps.commits.outputs.count != '0'
        run: |
          source $HOME/.cargo/env

          # Remember the original patch branch position
          PATCH_BRANCH=$(git rev-parse string-io-emulation)

          COMMITS=$(git rev-list --reverse origin/master..upstream/master)
          TOTAL=$(echo "$COMMITS" | grep -c . || true)
          CURRENT=0

          for UPSTREAM_HASH in $COMMITS; do
            [ -z "$UPSTREAM_HASH" ] && continue
            CURRENT=$((CURRENT + 1))
            SHORT=$(echo $UPSTREAM_HASH | head -c 7)
            MSG=$(git log --format='%s' -1 $UPSTREAM_HASH)

            echo ""
            echo "=== [$CURRENT/$TOTAL] ${SHORT}: ${MSG} ==="

            # Check if release already exists
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://github.com/${{ github.repository }}/releases/tag/patched-${SHORT}")
            if [ "$STATUS" = "200" ]; then
              echo "  Release patched-${SHORT} already exists, skipping"
              continue
            fi

            # Rebase the patch onto this upstream commit
            git checkout $PATCH_BRANCH --detach 2>/dev/null
            if git rebase --onto $UPSTREAM_HASH origin/master; then
              echo "  Patch rebased cleanly onto ${SHORT}"
            else
              echo "  ERROR: Rebase failed on ${SHORT}"
              git rebase --abort

              # Open an issue
              curl -s -X POST \
                -H "Authorization: token ${{ github.token }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues" \
                -d "{
                  \"title\": \"Rebase conflict on upstream ${SHORT}\",
                  \"body\": \"The string-io-emulation patch failed to rebase onto upstream commit ${SHORT} (${MSG}).\\n\\nManual resolution required.\",
                  \"labels\": [\"rebase-conflict\"]
                }"

              # Stop processing — later commits will also likely fail
              echo "  Stopping at ${SHORT} due to conflict"
              break
            fi

            # Build
            echo "  Building..."
            BUILD_START=$(date +%s)
            if cargo build --release --bin propolis-server; then
              BUILD_END=$(date +%s)
              BUILD_TIME=$((BUILD_END - BUILD_START))
              echo "  Built in ${BUILD_TIME}s"

              # Package
              gzip -c $CARGO_TARGET_DIR/release/propolis-server > propolis-server.gz
              sha256sum propolis-server.gz > propolis-server.gz.sha256

              # Generate patch script with baked-in tag
              git checkout $PATCH_BRANCH -- patch-propolis.sh 2>/dev/null || true
              if [ -f patch-propolis.sh ]; then
                sed "s/__RELEASE_TAG__/patched-${SHORT}/" patch-propolis.sh > patch-propolis-release.sh
                chmod +x patch-propolis-release.sh
              fi

              # Create release via API
              TAG="patched-${SHORT}"
              REPO="${{ github.repository }}"
              BODY=$(sed "s/__SHORT__/${SHORT}/g; s/__TAG__/${TAG}/g; s|__REPO__|${REPO}|g" .github/release-body.md)
              RELEASE_JSON=$(jq -n \
                --arg tag "$TAG" \
                --arg body "$BODY" \
                '{tag_name: $tag, target_commitish: "string-io-emulation", name: $tag, body: $body, draft: false, prerelease: false}')
              RELEASE_ID=$(curl -s -X POST \
                -H "Authorization: token ${{ github.token }}" \
                -H "Accept: application/vnd.github.v3+json" \
                -H "Content-Type: application/json" \
                "https://api.github.com/repos/${REPO}/releases" \
                -d "$RELEASE_JSON" | jq -r '.id // empty')

              if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "None" ]; then
                for FILE in propolis-server.gz propolis-server.gz.sha256 patch-propolis-release.sh; do
                  [ ! -f "$FILE" ] && continue
                  CONTENT_TYPE="application/octet-stream"
                  echo "$FILE" | grep -q '\.gz$' && CONTENT_TYPE="application/gzip"
                  curl -s -X POST \
                    -H "Authorization: token ${{ github.token }}" \
                    -H "Content-Type: ${CONTENT_TYPE}" \
                    --data-binary "@${FILE}" \
                    "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${FILE}" > /dev/null
                  echo "  Uploaded ${FILE}"
                done
                echo "  Release patched-${SHORT} created"
              else
                echo "  WARNING: Failed to create release for ${SHORT}"
              fi

              rm -f propolis-server.gz propolis-server.gz.sha256 patch-propolis-release.sh
            else
              echo "  WARNING: Build failed for ${SHORT}, skipping"
            fi
          done

      - name: Sync master with upstream
        if: steps.commits.outputs.count != '0'
        run: |
          git checkout -B master origin/master
          PREV_MASTER=$(git rev-parse master)
          git merge upstream/master --ff-only
          # Upstream may modify .github/workflows/ — restore ours to avoid needing workflows permission
          if ! git diff --quiet $PREV_MASTER HEAD -- .github/workflows/; then
            git checkout $PREV_MASTER -- .github/workflows/
            git commit -m "ci: preserve local workflows during upstream sync [skip ci]"
          fi
          git push origin master

      - name: Rebase patch branch
        if: steps.commits.outputs.count != '0'
        run: |
          git checkout -B string-io-emulation origin/string-io-emulation
          if git rebase master; then
            git push origin string-io-emulation --force-with-lease
            echo "Patch branch rebased and pushed"
          else
            git rebase --abort
            echo "WARNING: Final rebase of string-io-emulation failed"
            echo "Manual resolution needed"
          fi
